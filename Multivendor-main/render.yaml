services:
  - type: web
    name: multivendor-backend
    env: node
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y python3 make g++ \
      && npm install \
      && npm rebuild bcrypt --build-from-source
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
